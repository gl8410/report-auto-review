# ==========================================
# Report Review Lite - Docker Compose
# Compatible with Docker Compose V2 (docker compose)
# ==========================================

services:
  # ==========================================
  # Database (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15
    container_name: report-review-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /data/volumes/review_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network
    # No external port exposure for security

  # ==========================================
  # Vector Database (Chroma)
  # ==========================================
  chroma:
    image: chromadb/chroma:latest
    container_name: report-review-chroma
    restart: always
    volumes:
      - /data/volumes/review_chroma:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network
    # No external port exposure for security

  # ==========================================
  # Backend API (FastAPI)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: report-review-backend:latest
    container_name: report-review-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    ports:
      - "${BACKEND_PORT:-6802}:8874"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8874/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network
      - frontend-network
    volumes:
      - backend_uploads:/app/uploads

  # ==========================================
  # Frontend (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    image: report-review-frontend:latest
    container_name: report-review-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-7802}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-network

# ==========================================
# Networks
# ==========================================
networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

# ==========================================
# Volumes (Persistent Data)
# ==========================================
volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  backend_uploads:
    driver: local
